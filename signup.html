<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg: #f0f4ff;
      --card-shadow: 0 20px 60px rgba(37,99,235,0.12);
    }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
      background-image: radial-gradient(ellipse at 20% 50%, #dbeafe 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, #e0e7ff 0%, transparent 50%);
    }
    .card {
      border: none;
      border-radius: 20px;
      box-shadow: var(--card-shadow);
      max-width: 540px;
      width: 100%;
      padding: 2.5rem 2.75rem;
      background: #fff;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
    }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }
    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      margin: 1.5rem 0 0.75rem;
      border-top: 1px solid #f1f5f9;
      padding-top: 1.25rem;
    }
    .form-label { font-weight: 500; font-size: 0.85rem; color: #374151; margin-bottom: 0.35rem; }
    .form-control, .form-select {
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 0.7rem;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .login-link { text-align: center; font-size: 0.88rem; color: #64748b; margin-top: 1.25rem; }
    .login-link a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }
    .password-hint { font-size: 0.78rem; color: #94a3b8; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Create account.</div>
    <p class="subtitle">Fill in the details below to get started.</p>

    <form id="signupForm">
      <p class="section-label">Personal Information</p>
      <div class="row g-3">
        <div class="col-md-6">
          <label for="fname" class="form-label">First Name</label>
          <input type="text" class="form-control" id="fname" name="fname" placeholder="Juan" required />
        </div>
        <div class="col-md-6">
          <label for="lname" class="form-label">Last Name</label>
          <input type="text" class="form-control" id="lname" name="lname" placeholder="Dela Cruz" required />
        </div>
        <div class="col-md-6">
          <label for="bdate" class="form-label">Birthdate</label>
          <input type="date" class="form-control" id="bdate" name="bdate" required />
        </div>
        <div class="col-md-6">
          <label for="gender" class="form-label">Gender</label>
          <select class="form-select" id="gender" name="gender" required>
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Prefer not to say">Prefer not to say</option>
          </select>
        </div>
      </div>

      <p class="section-label">Contact Details</p>
      <div class="row g-3">
        <div class="col-md-7">
          <label for="gmail" class="form-label">Gmail</label>
          <input type="email" class="form-control" id="gmail" name="gmail" placeholder="you@gmail.com" required />
        </div>
        <div class="col-md-5">
          <label for="contact" class="form-label">Contact No.</label>
          <input type="tel" class="form-control" id="contact" name="contact" placeholder="09XXXXXXXXX" required />
        </div>
      </div>

      <p class="section-label">Account Setup</p>
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required />
      </div>
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Create password" required />
          <p class="password-hint">At least 8 characters</p>
        </div>
        <div class="col-md-6">
          <label for="conf" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="conf" name="conf" placeholder="Repeat password" required />
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100">Create Account</button>
    </form>

    <p class="login-link">Already have an account? <a href="login.html">Log In</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
