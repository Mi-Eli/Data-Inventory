<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory UI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #e5e5e5; }
    .hero-circle {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 50%;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0, 0, 139, 0.4);
    }
    .inventory-title { position: relative; }
    .inventory-title::after {
      content: "Inventory";
      position: absolute;
      left: 0;
      top: 0;
      color: rgba(0,0,0,0.2);
      filter: blur(4px);
      z-index: -1;
    }
    .floating-btn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
    }
    .custom-modal { border-radius: 20px; padding: 20px; }
    .scroll-container { max-height: 150px; overflow-y: auto; }
    .pill-btn { border-radius: 50px; margin: 5px; }
    .pill-btn.active { background-color: #212529; color: white; }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="navbar navbar-light bg-light px-3 d-flex justify-content-between">
  <span class="navbar-brand">Website</span>
  <div class="d-flex align-items-center gap-2">
    <input class="form-control" type="search" placeholder="Search">
    <button class="btn btn-outline-dark btn-sm" onclick="window.location.href='login.html'">Log Out</button>
  </div>
</nav>

<!-- MAIN -->
<div class="container text-center mt-5">
  <div class="hero-circle"></div>
  <h1 class="inventory-title">Inventory</h1>
</div>

<!-- FLOATING BUTTON -->
<button class="btn btn-dark floating-btn" data-bs-toggle="modal" data-bs-target="#infoModal">+</button>

<!-- MODAL -->
<div class="modal fade" id="infoModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content custom-modal">
      <h4 class="text-center">Set Info</h4>
      <input type="text" class="form-control my-3" placeholder="Enter Market Name">
      <hr>
      <p class="text-center">Choose product types</p>
      <div class="scroll-container text-center">
        <button class="btn btn-secondary pill-btn">Food</button>
        <button class="btn btn-secondary pill-btn">Drinks</button>
        <button class="btn btn-secondary pill-btn">Snacks</button>
        <button class="btn btn-secondary pill-btn">Fruits</button>
        <button class="btn btn-secondary pill-btn">Vegetables</button>
        <button class="btn btn-secondary pill-btn">Meat</button>
        <button class="btn btn-secondary pill-btn">Dairy</button>
        <button class="btn btn-secondary pill-btn">Bakery</button>
        <button class="btn btn-secondary pill-btn">Frozen</button>
        <button class="btn btn-secondary pill-btn">Seafood</button>
      </div>
      <button class="btn btn-dark w-100 mt-3">Start</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.querySelectorAll('.pill-btn').forEach(btn => {
    btn.addEventListener('click', () => btn.classList.toggle('active'));
  });
</script>

</body>
</html>
