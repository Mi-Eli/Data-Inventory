<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bg: #f0f4ff;
      --card-shadow: 0 20px 60px rgba(37,99,235,0.12);
    }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 20% 50%, #dbeafe 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, #e0e7ff 0%, transparent 50%);
    }
    .card {
      border: none;
      border-radius: 20px;
      box-shadow: var(--card-shadow);
      max-width: 420px;
      width: 100%;
      padding: 2.5rem 2.75rem;
      background: #fff;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
    }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }
    .form-label { font-weight: 500; font-size: 0.85rem; color: #374151; margin-bottom: 0.35rem; }
    .form-control {
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 0.7rem;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #94a3b8;
      font-size: 0.8rem;
      margin: 1.25rem 0;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
    .signup-link { text-align: center; font-size: 0.88rem; color: #64748b; }
    .signup-link a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .signup-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Welcome back.</div>
    <p class="subtitle">Log in to your account to continue.</p>

    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn btn-primary w-100">Log In</button>
    </form>

    <div class="divider">or</div>
    <p class="signup-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      window.location.href = 'homepage.html';
    });
  </script>
</body>
</html>
